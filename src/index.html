<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pure Markdown</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/editor.css" />
  <link rel="stylesheet" href="styles/preview.css" />
  <link rel="stylesheet" href="vendor/highlight-github-light.css" media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" href="vendor/highlight-github-dark.css" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="vendor/katex.min.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="icon.svg" alt="Pure Markdown" class="sidebar-logo" width="28" height="28" />
        <h2>Pure Markdown</h2>
        <button id="btn-sidebar-hide" class="sidebar-toggle-hide" title="Hide sidebar (Ctrl+\)">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M10 3l-5 5 5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="sidebar-actions">
        <button id="btn-new" title="New file (Ctrl+N)">+ New</button>
        <button id="btn-open" title="Open file (Ctrl+O)">Open</button>
      </div>
      <div class="sidebar-section">
        <h3>Recent Files</h3>
        <ul id="recent-list"></ul>
      </div>
    </aside>

    <!-- Main area -->
    <main id="main">
      <!-- Tab bar -->
      <div id="tab-bar">
        <button id="btn-sidebar-show" class="sidebar-toggle-show" title="Show sidebar (Ctrl+\)">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M6 3l5 5-5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="tabs-container"></div>
        <button id="btn-new-tab" title="New tab (Ctrl+N)">+</button>
      </div>

      <!-- Editor + Preview split -->
      <div id="workspace">
        <div id="editor-pane">
          <textarea id="editor" spellcheck="false" placeholder="Start writing markdown..."></textarea>
        </div>
        <div id="splitter"></div>
        <div id="preview-pane">
          <div id="preview"></div>
        </div>
      </div>

      <!-- Status bar -->
      <div id="status-bar">
        <div class="status-left">
          <span id="status-line-info">Ln 1, Col 1</span>
          <span class="status-sep">|</span>
          <span id="status-word-count">0 words</span>
          <span class="status-sep">|</span>
          <span id="status-char-count">0 chars</span>
        </div>
        <div class="status-right">
          <button id="btn-view-editor" class="view-btn" title="Editor only">
            <svg width="16" height="16" viewBox="0 0 16 16">
              <rect x="1" y="2" width="14" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </button>
          <button id="btn-view-split" class="view-btn active" title="Split view">
            <svg width="16" height="16" viewBox="0 0 16 16">
              <rect x="1" y="2" width="14" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </button>
          <button id="btn-view-preview" class="view-btn" title="Preview only">
            <svg width="16" height="16" viewBox="0 0 16 16">
              <rect x="1" y="2" width="14" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <rect x="3" y="4.5" width="10" height="7" rx="1" fill="currentColor" opacity="0.25"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="vendor/katex.min.js"></script>
  <script src="vendor/marked-katex.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
